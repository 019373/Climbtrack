name: Deploy ClimbTrack to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # required to push the gh-pages branch

# Only one deployment at a time; new pushes cancel in-progress builds.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ClimbTrack for GitHub Pages
        run: pnpm --filter @workspace/climbtrack run build:github

      # GitHub Pages doesn't support SPA client-side routing.
      # Copying index.html → 404.html means any direct URL loads the app,
      # and wouter re-routes from the correct base path automatically.
      - name: Create 404.html for SPA routing
        run: cp artifacts/climbtrack/dist/index.html artifacts/climbtrack/dist/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifacts/climbtrack/dist
          # Keeps gh-pages as a single orphan commit (cleaner history).
          force_orphan: true
          # Prevents Jekyll from rewriting asset paths that start with _.
          enable_jekyll: false
